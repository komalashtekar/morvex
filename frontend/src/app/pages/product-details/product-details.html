<section class="container mx-auto py-20">

  <div class="grid md:grid-cols-2 gap-10">

    <div>

      <img
        [src]="product.image"
        class="rounded-2xl shadow-xl">

    </div>

    <div>

      <h1 class="text-3xl font-bold">
        {{product.name}}
      </h1>

     <div class="mt-6 space-y-3">
  <div
    *ngFor="let point of product.description"
    class="flex items-start gap-3"
  >
    <i class="fa-solid fa-circle-check text-blue-900 mt-1"></i>
    <span class="text-base text-gray-700">{{ point }}</span>
  </div>
</div>
      <button
        routerLink="/contact"
        class="bg-blue-900 text-white px-8 py-3 rounded mt-10">

        Enquiry Now

      </button>

    </div>

  </div>

</section>

<!-- Contact Information -->
<div class="w-full bg-gradient-to-r bg-slate-900/95 shadow-xl px-8 py-2 ">

    <div class="grid grid-cols-1 md:grid-cols-3 divide-y md:divide-y-0 md:divide-x divide-white/20">

        <!-- Phone -->
        <div class="flex items-center gap-5 px-6 py-4">

            <div
                class="w-16 h-16 rounded-full border border-yellow-400 flex items-center justify-center text-yellow-400 text-3xl">
                📞
            </div>

            <div>
                <h4 class="text-white text-xl font-semibold">Call Us</h4>
                <p class="text-blue-100 text-lg mt-1">
                    +91 7058492729
                </p>
            </div>

        </div>

        <!-- Email -->
        <div class="flex items-center gap-5 px-6 py-4">

            <div
                class="w-16 h-16 rounded-full border border-yellow-400 flex items-center justify-center text-yellow-400 text-3xl">
                ✉️
            </div>

            <div>
                <h4 class="text-white text-xl font-semibold">Email</h4>
                <p class="text-blue-100 text-lg mt-1 break-all">
                    sales@morvexindia.com
                </p>
            </div>

        </div>

        <!-- Address -->
        <div class="flex items-center gap-5 px-6 py-4">

            <div
                class="w-16 h-16 rounded-full border border-yellow-400 flex items-center justify-center text-yellow-400 text-3xl">
                📍
            </div>

            <div>
                <h4 class="text-white text-xl font-semibold">
                    Corporate Office
                </h4>

                <p class="text-blue-100 leading-7 mt-1">
                    MORVEX Industrial Solutions Pvt. Ltd.<br>
                    SRno.106, Hadapsar Inustrial Estate<br>
                    Pune, Maharashtra, India
                </p>

            </div>

        </div>

    </div>

</div>
